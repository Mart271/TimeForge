name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: timeforge_owner
          POSTGRES_PASSWORD: owner_password
          POSTGRES_DB: timeforge
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U timeforge_owner" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://timeforge_owner:owner_password@localhost:5432/timeforge?schema=public
      DIRECT_URL: postgresql://timeforge_owner:owner_password@localhost:5432/timeforge?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npx prisma generate
      - run: npm run build
      - run: npx prisma db push --skip-generate
      - run: npm run db:seed
      # - run: npm test   # enable once unit tests are added (Phase 8)
